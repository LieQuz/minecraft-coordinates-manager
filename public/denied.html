<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アクセス拒否</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #080b14;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .box {
      padding: 48px 32px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      max-width: 400px;
    }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.2rem; margin-bottom: 8px; }
    p { color: #64748b; font-size: 0.9rem; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">⛏️🔒</div>
    <h1>アクセスできません</h1>
    <p>このサイトにアクセスするには招待リンクが必要です。<br/>フレンドに招待URLを送ってもらってください。</p>
  </div>
</body>
</html>
