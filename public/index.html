<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⛏️ Minecraft 座標マネージャー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow"></div>

  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⛏️</span>
        <div>
          <h1>座標マネージャー</h1>
          <p>Minecraft Coordinates</p>
        </div>
      </div>
    </div>
  </header>

  <main>
    <!-- 追加フォーム -->
    <section class="card" id="add-section">
      <div class="card-title">
        <span class="card-icon">＋</span>
        <h2>新しい場所を追加</h2>
      </div>
      <form id="add-form">
        <div class="form-grid">
          <div class="form-group full-width">
            <label for="name">場所の名前 <span class="required">*</span></label>
            <input type="text" id="name" placeholder="例：拠点、村、砂漠神殿" required />
          </div>
          <div class="form-group coord-group">
            <label>座標 (X / Z) <span class="required">*</span></label>
            <div class="coord-inputs">
              <div class="coord-field">
                <span class="coord-label x">X</span>
                <input type="number" id="x" placeholder="0" required />
              </div>
              <div class="coord-field">
                <span class="coord-label z">Z</span>
                <input type="number" id="z" placeholder="0" required />
              </div>
            </div>
          </div>
          <div class="form-group full-width">
            <label for="dimension">ディメンション</label>
            <select id="dimension">
              <option value="overworld">🌍 オーバーワールド</option>
              <option value="nether">🔥 ネザー</option>
              <option value="end">🌌 エンド</option>
            </select>
          </div>
          <div class="form-group full-width">
            <label for="notes">メモ <span class="optional">任意</span></label>
            <textarea id="notes" placeholder="備考や特記事項など..."></textarea>
          </div>
        </div>
        <div id="form-error" class="error-msg" hidden></div>
        <button type="submit" class="btn btn-primary">追加する</button>
      </form>
    </section>

    <!-- フィルター & 検索 -->
    <section class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" placeholder="名前やメモで検索..." />
      </div>
      <select id="filter-dimension">
        <option value="">すべてのディメンション</option>
        <option value="overworld">🌍 オーバーワールド</option>
        <option value="nether">🔥 ネザー</option>
        <option value="end">🌌 エンド</option>
      </select>
      <button class="btn btn-ghost" id="clear-filters">クリア</button>
    </section>

    <!-- 座標一覧 -->
    <section id="list-section">
      <div class="list-header">
        <h2>登録済みの場所</h2>
        <span id="count-badge" class="badge">0件</span>
      </div>
      <div id="coords-list">
        <div class="loading">読み込み中...</div>
      </div>
    </section>
  </main>

  <!-- 削除確認モーダル -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-icon">🗑️</div>
      <h3>削除しますか？</h3>
      <p id="modal-message"></p>
      <div class="modal-buttons">
        <button class="btn btn-danger" id="modal-confirm">削除する</button>
        <button class="btn btn-ghost" id="modal-cancel">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- コピー通知 -->
  <div id="copy-toast" class="toast" hidden>コピーしました！</div>

  <script src="app.js"></script>
</body>
</html>
